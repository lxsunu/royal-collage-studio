<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Collage Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0d0d0d;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: black;
}

header h2 {
    color: #d4af37;
}

.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    color: #d4af37;
}

.section {
    padding: 60px 50px;
}

.products {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #1a1a1a;
    padding: 20px;
    width: 300px;
    border-radius: 15px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.btn {
    background: #d4af37;
    color: black;
    padding: 10px 20px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h2>Royal Collage Studio</h2>
</header>

<section class="hero">
    <h1>Premium Editable Photo Collage Templates</h1>
    <p>Instant Download | Easy to Edit | High Quality PSD Files</p>
</section>

<section class="section">
    <div class="products">

        <!-- Wedding -->
        <div class="card">
            <h3>Wedding Collage</h3>
            <img src="bgfb fg.png">
            <p>$15</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <!-- Birthday -->
        <div class="card">
            <h3>Birthday Collage</h3>
            <img src="dewdee.jpg">
            <p>$12</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <!-- Baby -->
        <div class="card">
            <h3>Baby Collage</h3>
            <img src="frdvfdv.jpg">
            <p>$18</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

    </div>
</section>

</body>
</html>
